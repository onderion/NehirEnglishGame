<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title id="page-title">English for Kids</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        h1 { color: #ff6f61; font-size: 24px; margin: 10px 0; font-weight: bold; }
        
        /* İsim Giriş Ekranı Stili */
        #name-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f0f4f8; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1000;
        }
        .name-input {
            padding: 15px; font-size: 20px; border-radius: 15px;
            border: 3px solid #ffca28; outline: none; margin-bottom: 20px;
            width: 70%; max-width: 300px; text-align: center;
        }
        .start-game-btn {
            padding: 15px 40px; font-size: 20px; background: #4caf50;
            color: white; border: none; border-radius: 15px; cursor: pointer;
            font-weight: bold; box-shadow: 0 4px rgba(0,0,0,0.1);
        }

        .menu-grid {
            display: none; /* İsim girilene kadar gizli */
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        
        .random-btn {
            grid-column: span 2;
            padding: 25px;
            font-size: 22px;
            background: linear-gradient(45deg, #ff6f61, #ffca28);
            border: none;
            border-radius: 20px;
            color: white;
            font-weight: 900;
            margin-bottom: 5px;
            cursor: pointer;
            box-shadow: 0 6px rgba(0,0,0,0.1);
        }

        .menu-btn {
            padding: 20px 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px rgba(0,0,0,0.1);
        }

        .game-area {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 10px auto;
        }

        #target-text { font-size: 22px; font-weight: bold; color: #333; margin: 15px 0; min-height: 40px; }
        
        .item-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
        }

        .card {
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; border-radius: 18px;
            cursor: pointer; background-color: #fff;
            border: 4px solid #eee; transition: 0.2s;
        }

        .sound-card { width: 75px; height: 75px; font-size: 35px; background: #e1f5fe; border: 4px solid #b3e5fc; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .image-card { width: 75px; height: 75px; font-size: 40px; background: #fff; border: 4px solid #eee; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .selected { border-color: #ffd600 !important; background: #fff9c4 !important; transform: scale(1.05); }
        .matched { border-color: #4caf50 !important; background: #e8f5e9 !important; opacity: 0.5; cursor: default !important; }

        .yes-no-btn {
            width: 100px; height: 100px;
            font-size: 55px; border-radius: 50%;
            border: none; cursor: pointer; margin: 15px;
            color: white; font-weight: bold;
            box-shadow: 0 6px rgba(0,0,0,0.2);
            display: inline-flex; align-items: center; justify-content: center;
        }
        
        .speaker-btn { font-size: 70px; background: none; border: none; cursor: pointer; }
        hr { border: 0; height: 2px; background: #eee; margin: 15px 0; width: 100%; }
    </style>
</head>
<body>

    <div id="name-screen">
        <h1>Welcome!</h1>
        <p style="font-weight: bold; color: #555;">What is your name?</p>
        <input type="text" id="user-name-input" class="name-input" placeholder="Type your name..." maxlength="15">
        <button class="start-game-btn" onclick="saveName()">Let's Play! 🚀</button>
    </div>

    <h1 id="game-main-title">🌟 English for Kids 🌟</h1>
    
    <div id="main-menu" class="menu-grid">
        <button class="random-btn" onclick="startGame('random')">🎲 MIXED / RANDOM</button>
      
        <button class="menu-btn" style="background:#ff6f61" onclick="startGame('toys')">🧸 Toys</button>
        <button class="menu-btn" style="background:#42a5f5" onclick="startGame('colors')">🎨 Colors</button>
        <button class="menu-btn" style="background:#66bb6a" onclick="startGame('animals')">🐶 Animals</button>
        <button class="menu-btn" style="background:#ffca28" onclick="startGame('numbers')">🔢 Numbers</button>
        <button class="menu-btn" style="background:#34495e" onclick="startGame('vehicles')">✈️ Vehicles</button>
        <button class="menu-btn" style="background:#f06292" onclick="startGame('fruits')">🍎 Fruits</button>
        <button class="menu-btn" style="background:#009688" onclick="startGame('veggies')">🍆 Veggies</button>
        <button class="menu-btn" style="background:#9C27B0" onclick="startGame('clothes')">👗 Clothes</button>
        <button class="menu-btn" style="background:#ffb74d" onclick="startGame('school')">🎒 School</button>
        <button class="menu-btn" style="background:#CDDC39" onclick="startGame('feelings')">😊 Feelings</button>
        <button class="menu-btn" style="background:#795548" onclick="startGame('people')">👫 People</button>
        <button class="menu-btn" style="background:#00BCD4" onclick="startGame('shapes')">💢 Shapes</button>
        <button class="menu-btn" style="background:#3F51B5" onclick="startGame('weather')">🌄 Weather</button>
        <button class="menu-btn" style="background:#f44336" onclick="startGame('letters')">🔠 Letters</button>
    </div>

    <div id="game-screen" class="game-area">
        <div id="target-text">Ready?</div>
        <div id="game-content"></div>
        <br>
        <button class="menu-btn" style="background:#90a4ae; padding: 10px 20px; font-size:28px;" onclick="showMenu()">🏠 Menu</button>
    </div>

    <script>
        // İsim Değişkeni
        let userName = "Nehir"; // Varsayılan

        function saveName() {
            const input = document.getElementById('user-name-input');
            if(input.value.trim() !== "") {
                userName = input.value.trim();
            }
            
            // Başlıkları Güncelle
            document.getElementById('game-main-title').innerText = `🌟 English for ${userName} 🌟`;
            document.getElementById('page-title').innerText = `English for ${userName}`;
            
            // Ekranları değiştir
            document.getElementById('name-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'grid';
            
            // İlk sesi tetikle (Safari/iOS için ses kilidini açar)
            speak(`Hello ${userName}, let's learn English!`);
        }

        const data = {
            toys: [{n:'Teddy Bear', v:'🧸'}, {n:'Doll', v:'🪆'}, {n:'Ball', v:'⚽'}, {n:'Car', v:'🚗'}, {n:'Balloon', v:'🎈'}, {n:'Robot', v:'🤖'}, {n:'Kite', v:'🪁'}],
            colors: [{n:'Red', v:'#ff0000'}, {n:'Blue', v:'#0000ff'}, {n:'Green', v:'#008000'}, {n:'Yellow', v:'#ffff00'}, {n:'Pink', v:'#ffc0cb'}, {n:'Purple', v:'#800080'}, {n:'Orange', v:'#ffa500'}, {n:'White', v:'#ffffff'}, {n:'Black', v:'#000000'}, {n:'Gray', v:'#808080'}, {n:'Brown', v:'#895129'}],
            animals: [{n:'Dog', v:'🐶'}, {n:'Cat', v:'🐱'}, {n:'Lion', v:'🦁'}, {n:'Monkey', v:'🐵'}, {n:'Rabbit', v:'🐰'}, {n:'Elephant', v:'🐘'}, {n:'Fish', v:'🐟'}, {n:'Bee', v:'🐝'}, {n:'Ant', v:'🐜'}, {n:'Turtle', v:'🐢'}, {n:'Penguin', v:'🐧'}, {n:'Panda', v:'🐼'}, {n:'Cow', v:'🐮'}, {n:'Pig', v:'🐖'}, {n:'Horse', v:'🐴'}, {n:'Mouse', v:'🐭'}, {n:'Bear', v:'🐻'}, {n:'Tiger', v:'🐅'}, {n:'Frog', v:'🐸'}, {n:'Snail', v:'🐌'}, {n:'Fox', v:'🦊'}, {n:'Butterfly', v:'🦋'}, {n:'Zebra', v:'🦓'}, {n:'Giraffe', v:'🦒'}, {n:'Egg', v:'🥚'}],
            numbers: [{n:'One', v:'1'}, {n:'Two', v:'2'}, {n:'Three', v:'3'}, {n:'Four', v:'4'}, {n:'Five', v:'5'}, {n:'Six', v:'6'}],
            vehicles: [{n:'Airplane', v:'✈️'}, {n:'Ship', v:'🚢'}, {n:'Train', v:'🚂'}, {n:'Fire Truck', v:'🚒'}, {n:'Police Car', v:'🚓'}, {n:'Bicycle', v:'🚲'}, {n:'Helicopter', v:'🚁'}, {n:'Rocket', v:'🚀'}, {n:'Truck', v:'🚚'}, {n:'Bus', v:'🚌'}, {n:'Car', v:'🚗'}, {n:'Motorcycle', v:'🏍️'}],
            fruits: [{n:'Apple', v:'🍎'}, {n:'Banana', v:'🍌'}, {n:'Watermelon', v:'🍉'}, {n:'Strawberry', v:'🍓'}, {n:'Grape', v:'🍇'},{n:'Orange', v:'🍊'}, {n:'Lemon', v:'🍋'}, {n:'Cherry', v:'🍒'}, {n:'Kiwi', v:'🥝'}, {n:'Avocado', v:'🥑'}, {n:'Pineapple', v:'🍍'}, {n:'Blueberry', v:'🫐'}],
            veggies: [{n:'Tomato', v:'🍅'}, {n:'Cucumber', v:'🥒'}, {n:'Eggplant', v:'🍆'}, {n:'Corn', v:'🌽'}, {n:'Broccoli', v:'🥦'}, {n:'Potato', v:'🥔'}, {n:'Carrot', v:'🥕'}, {n:'Mushroom', v:'🍄'}],
            clothes: [{n:'T-shirt', v:'👕'}, {n:'Dress', v:'👗'}, {n:'Hat', v:'👒'}, {n:'Shoes', v:'👟'}, {n:'Socks', v:'🧦'}, {n:'Jacket', v:'🧥'}],
            school: [{n:'Backpack', v:'🎒'}, {n:'Pencil', v:'✏️'}, {n:'Book', v:'📖'}, {n:'Ruler', v:'📏'}, {n:'Pen', v:'🖊️'}, {n:'Notebook', v:'📒'}, {n:'Pencil Case', v:'👝'}],
            feelings: [{n:'Happy', v:'😊'}, {n:'Sad', v:'😞'}, {n:'Laughing', v:'😆'}, {n:'Crying', v:'😭'}, {n:'Angry', v:'😡'}, {n:'Sleepy', v:'😴'}],
            people: [{n:'Dad', v:'👱🏻‍♂️'}, {n:'Mom', v:'👩🏻'}, {n:'Boy', v:'👦🏻'}, {n:'Girl', v:'👧'}, {n:'Grandmother', v:'👵'}, {n:'Grandfather', v:'👴'}, {n:'Baby', v:'👶🏻'}],
            shapes: [{n:'Square', v:'🔲'}, {n:'Circle', v:'🔴'}, {n:'Triangle', v:'🔺'}, {n:'Star', v:'⭐'}, {n:'Heart', v:'❤️'}],
            weather: [{n:'Rain', v:'☔'}, {n:'Sun', v:'🌞'}, {n:'Moon', v:'🌙'}, {n:'Rainbow', v:'🌈'}, {n:'Cloud', v:'☁️'}, {n:'Snow', v:'❄️'}],
            letters: [{n:'a', v:'A-a'}, {n:'b', v:'B-b'}, {n:'c', v:'C-c'}, {n:'d', v:'D-d'}, {n:'e', v:'E-e'}, {n:'n', v:'N-n'}]
        };

        let currentCat = '';
        let activeSoundObj = null;
        let activeSoundElement = null;
        let matchWinCount = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.7;
            window.speechSynthesis.speak(u);
        }

        function showMenu() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('game-screen').style.display = 'none';
        }

        function startGame(mode) {
            currentCat = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            nextTurn();
        }

        function nextTurn() {
            const gameContainer = document.getElementById('game-content');
            const title = document.getElementById('target-text');
            gameContainer.innerHTML = '';
            
            let sourceItems = [];
            if (currentCat === 'random') {
                Object.keys(data).forEach(key => {
                    sourceItems = sourceItems.concat(data[key]);
                });
            } else {
                sourceItems = data[currentCat];
            }

            const randomType = Math.floor(Math.random() * 3);
            const items = [...sourceItems].sort(() => Math.random() - 0.5);

            if (randomType === 0) {
                const target = items[0];
                title.innerText = "Find the " + target.n;
                speak(target.n);
                
                const btnSpk = document.createElement('button');
                btnSpk.className = 'speaker-btn'; btnSpk.innerHTML = '🔊';
                btnSpk.onclick = () => speak(target.n);
                gameContainer.appendChild(btnSpk);

                const grid = document.createElement('div'); grid.className = 'item-container';
                items.slice(0, 4).sort(() => Math.random() - 0.5).forEach(item => {
                    const card = createCard(item);
                    card.onclick = () => {
                        if(item.n === target.n) { 
                            speak(`Great Job, ${userName}!`); 
                          card.style.borderColor = "#4caf50";
                            setTimeout(() => { if(!card.classList.contains('matched')) card.style.borderColor = "#ddd"; }, 500);
                            title.innerText = "🌟 CORRECT! 🌟"; 
                            setTimeout(nextTurn, 2000); 
                        }
                        else { 
                            speak("Ooops!"); card.style.borderColor = "#f44336";
                            setTimeout(() => { if(!card.classList.contains('matched')) card.style.borderColor = "#ddd"; }, 500);
                        }
                    };
                    grid.appendChild(card);
                });
                gameContainer.appendChild(grid);

            } else if (randomType === 1) {
                const target = items[0];
                const isCorrect = Math.random() > 0.5;
                const visual = isCorrect ? target : items[1];
                
                title.innerText = "Is this a " + target.n + "?";
                speak("Is this a " + target.n + "?");

                const bigCard = createCard(visual);
                bigCard.style.margin = "20px auto";
                gameContainer.appendChild(bigCard);

                const btnGroup = document.createElement('div');
                const btnY = document.createElement('button'); btnY.className = 'yes-no-btn'; btnY.style.background = '#4caf50'; btnY.innerText = '✓'; btnY.style.color = '#ffffff';
                btnY.onclick = () => { if(isCorrect) { speak(`Great Job, ${userName}!`); title.innerText = "🌟 YES! 🌟"; setTimeout(nextTurn, 2000); } else speak("Ooops!"); };
                
                const btnN = document.createElement('button'); btnN.className = 'yes-no-btn'; btnN.style.background = '#f44336'; btnN.innerText = '✕'; btnN.style.color = '#ffffff';
                btnN.onclick = () => { if(!isCorrect) { speak(`Great Job, ${userName}!`); title.innerText = "🌟 YES! 🌟"; setTimeout(nextTurn, 2000); } else speak("Ooops!"); };
                
                btnGroup.appendChild(btnY); btnGroup.appendChild(btnN);
                gameContainer.appendChild(btnGroup);

            } else {
                title.innerText = "Match the sounds!";
                matchWinCount = 0; activeSoundObj = null; activeSoundElement = null;
                const set = items.slice(0, 5);

                const sRow = document.createElement('div'); sRow.className = 'item-container';
                const iRow = document.createElement('div'); iRow.className = 'item-container';

                [...set].sort(() => Math.random() - 0.5).forEach(item => {
                    const sBtn = document.createElement('div');
                    sBtn.className = 'sound-card'; sBtn.innerHTML = '🔊';
                    sBtn.onclick = () => {
                        if(sBtn.classList.contains('matched')) return;
                        speak(item.n);
                        document.querySelectorAll('.sound-card').forEach(b => b.classList.remove('selected'));
                        sBtn.classList.add('selected');
                        activeSoundObj = item;
                        activeSoundElement = sBtn;
                    };
                    sRow.appendChild(sBtn);
                });

                [...set].sort(() => Math.random() - 0.5).forEach(item => {
                    const iBtn = document.createElement('div');
                    iBtn.className = 'image-card';
                    if(item.v.startsWith('#')) iBtn.style.background = item.v; else iBtn.innerText = item.v;
                    iBtn.onclick = () => {
                        if(iBtn.classList.contains('matched') || !activeSoundObj) return;
                        if(activeSoundObj.n === item.n) {
                            iBtn.classList.add('matched');
                            activeSoundElement.classList.add('matched');
                            activeSoundElement.innerHTML = '✅';
                            speak("Correct!");
                            matchWinCount++;
                            activeSoundObj = null; activeSoundElement = null;
                            if(matchWinCount === 5) { speak(`Great Job, ${userName}!`); title.innerText = "🌟 AMAZING! 🌟"; setTimeout(nextTurn, 2500); }
                        } else { 
                          speak("Ooops!"); iBtn.style.borderColor = "#f44336";
                          setTimeout(() => { if(!iBtn.classList.contains('matched')) iBtn.style.borderColor = "#ddd"; }, 500);
                        }
                    };
                    iRow.appendChild(iBtn);
                });

                gameContainer.appendChild(sRow);
                gameContainer.appendChild(document.createElement('hr'));
                gameContainer.appendChild(iRow);
            }
        }

        function createCard(item) {
            const div = document.createElement('div'); div.className = 'card';
            if(item.v.startsWith('#')) div.style.backgroundColor = item.v; else div.innerText = item.v;
            return div;
        }
    </script>
</body>
</html>
