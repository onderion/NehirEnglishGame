<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English for Nehir - Final Fixed</title>
    <style>
        /* Tamamen okunaklı ve düz fontlar */
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f0f4f8;
            text-align: center;
            margin: 0;
            padding: 10px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        h1 { color: #ff6f61; font-size: 24px; margin: 10px 0; font-weight: bold; }
        
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 500px;
            margin: 0 auto;
        }
        .menu-btn {
            padding: 20px 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px rgba(0,0,0,0.1);
        }

        .game-area {
            display: none;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 10px auto;
        }

        #target-text { font-size: 22px; font-weight: bold; color: #333; margin: 15px 0; min-height: 40px; }
        
        .item-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 10px 0;
        }

        /* Kart Tasarımları */
        .card {
            width: 90px; height: 90px;
            display: flex; align-items: center; justify-content: center;
            font-size: 45px; border-radius: 18px;
            cursor: pointer; background-color: #fff;
            border: 4px solid #eee; transition: 0.2s;
        }

        /* Eşleştirme Modu Kartları */
        .sound-card { width: 75px; height: 75px; font-size: 35px; background: #e1f5fe; border: 4px solid #b3e5fc; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .image-card { width: 75px; height: 75px; font-size: 40px; background: #fff; border: 4px solid #eee; border-radius: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .selected { border-color: #ffd600 !important; background: #fff9c4 !important; transform: scale(1.05); }
        .matched { border-color: #4caf50 !important; background: #e8f5e9 !important; opacity: 0.5; cursor: default !important; }

        .yes-no-btn {
            width: 100px; height: 100px;
            font-size: 55px; border-radius: 50%;
            border: none; cursor: pointer; margin: 15px;
            color: white; font-weight: bold;
            box-shadow: 0 6px rgba(0,0,0,0.2);
            display: inline-flex; align-items: center; justify-content: center;
        }
        
        .speaker-btn { font-size: 70px; background: none; border: none; cursor: pointer; }
        hr { border: 0; height: 2px; background: #eee; margin: 15px 0; width: 100%; }
    </style>
</head>
<body>

    <h1>🌟 English for Nehir 🌟</h1>
    
    <div id="main-menu" class="menu-grid">
        <button class="menu-btn" style="background:#ff6f61" onclick="startGame('toys')">🧸 Toys</button>
        <button class="menu-btn" style="background:#42a5f5" onclick="startGame('colors')">🎨 Colors</button>
        <button class="menu-btn" style="background:#66bb6a" onclick="startGame('animals')">🐶 Animals</button>
        <button class="menu-btn" style="background:#ffca28" onclick="startGame('numbers')">🔢 Numbers</button>
        <button class="menu-btn" style="background:#f06292" onclick="startGame('fruits')">🍎 Fruits</button>
        <button class="menu-btn" style="background:#ba68c8" onclick="startGame('clothes')">👗 Clothes</button>
        <button class="menu-btn" style="background:#ffb74d" onclick="startGame('school')">🎒 School</button>
    </div>

    <div id="game-screen" class="game-area">
        <div id="target-text">Ready?</div>
        <div id="game-content"></div>
        <br>
        <button class="menu-btn" style="background:#90a4ae; padding: 10px 20px; font-size:14px;" onclick="showMenu()">🏠 Menu</button>
    </div>

    <script>
        const data = {
            toys: [{n:'Teddy Bear', v:'🧸'}, {n:'Doll', v:'🪆'}, {n:'Ball', v:'⚽'}, {n:'Car', v:'🚗'}, {n:'Balloon', v:'🎈'}, {n:'Robot', v:'🤖'}],
            colors: [{n:'Red', v:'#ff0000'}, {n:'Blue', v:'#0000ff'}, {n:'Green', v:'#008000'}, {n:'Yellow', v:'#ffff00'}, {n:'Pink', v:'#ffc0cb'}, {n:'Purple', v:'#800080'}],
            animals: [{n:'Dog', v:'🐶'}, {n:'Cat', v:'🐱'}, {n:'Lion', v:'🦁'}, {n:'Monkey', v:'🐵'}, {n:'Rabbit', v:'🐰'}, {n:'Elephant', v:'🐘'}],
            numbers: [{n:'One', v:'1'}, {n:'Two', v:'2'}, {n:'Three', v:'3'}, {n:'Four', v:'4'}, {n:'Five', v:'5'}, {n:'Six', v:'6'}],
            fruits: [{n:'Apple', v:'🍎'}, {n:'Banana', v:'🍌'}, {n:'Watermelon', v:'🍉'}, {n:'Strawberry', v:'🍓'}, {n:'Carrot', v:'🥕'}, {n:'Grape', v:'🍇'}],
            clothes: [{n:'T-shirt', v:'👕'}, {n:'Dress', v:'👗'}, {n:'Hat', v:'👒'}, {n:'Shoes', v:'👟'}, {n:'Socks', v:'🧦'}, {n:'Jacket', v:'🧥'}],
            school: [{n:'Backpack', v:'🎒'}, {n:'Pencil', v:'✏️'}, {n:'Book', v:'📖'}, {n:'Ruler', v:'📏'}, {n:'Pen', v:'🖊️'}, {n:'Notebook', v:'📒'}]
        };

        let currentCat = '';
        let activeSoundObj = null; // Eşleştirme için seçili olan nesne
        let activeSoundElement = null; // Eşleştirme için seçili olan buton
        let matchWinCount = 0;

        function speak(text) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US'; u.rate = 0.7;
            window.speechSynthesis.speak(u);
        }

        function showMenu() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('game-screen').style.display = 'none';
        }

        function startGame(mode) {
            currentCat = mode;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            nextTurn();
        }

        function nextTurn() {
            const gameContainer = document.getElementById('game-content');
            const title = document.getElementById('target-text');
            gameContainer.innerHTML = '';
            
            const randomType = Math.floor(Math.random() * 3); // 0: Klasik, 1: Evet/Hayır, 2: Eşleştirme
            const items = [...data[currentCat]].sort(() => Math.random() - 0.5);

            if (randomType === 0) {
                // --- KLASİK BULMA ---
                const target = items[0];
                title.innerText = "Find the " + target.n;
                speak(target.n);
                
                const btnSpk = document.createElement('button');
                btnSpk.className = 'speaker-btn'; btnSpk.innerHTML = '🔊';
                btnSpk.onclick = () => speak(target.n);
                gameContainer.appendChild(btnSpk);

                const grid = document.createElement('div'); grid.className = 'item-container';
                items.slice(0, 4).sort(() => Math.random() - 0.5).forEach(item => {
                    const card = createCard(item);
                    card.onclick = () => {
                        if(item.n === target.n) { speak("Great Job Nehir!"); title.innerText = "🌟 CORRECT! 🌟"; setTimeout(nextTurn, 2000); }
                        else { speak("Try again!"); }
                    };
                    grid.appendChild(card);
                });
                gameContainer.appendChild(grid);

            } else if (randomType === 1) {
                // --- EVET / HAYIR ---
                const target = items[0];
                const isCorrect = Math.random() > 0.5;
                const visual = isCorrect ? target : items[1];
                
                title.innerText = "Is this a " + target.n + "?";
                speak("Is this a " + target.n + "?");

                const bigCard = createCard(visual);
                bigCard.style.margin = "20px auto";
                gameContainer.appendChild(bigCard);

                const btnGroup = document.createElement('div');
                const btnY = document.createElement('button'); btnY.className = 'yes-no-btn'; btnY.style.background = '#4caf50'; btnY.innerText = '✓';
                btnY.onclick = () => { if(isCorrect) { speak("Great Job Nehir!"); title.innerText = "🌟 YES! 🌟"; setTimeout(nextTurn, 2000); } else speak("Try again!"); };
                
                const btnN = document.createElement('button'); btnN.className = 'yes-no-btn'; btnN.style.background = '#f44336'; btnN.innerText = '✕';
                btnN.onclick = () => { if(!isCorrect) { speak("Great Job Nehir!"); title.innerText = "🌟 YES! 🌟"; setTimeout(nextTurn, 2000); } else speak("Try again!"); };
                
                btnGroup.appendChild(btnY); btnGroup.appendChild(btnN);
                gameContainer.appendChild(btnGroup);

            } else {
                // --- 5'Lİ EŞLEŞTİRME (EN STABİL MANTIK) ---
                title.innerText = "Match the sounds!";
                matchWinCount = 0; activeSoundObj = null; activeSoundElement = null;
                const set = items.slice(0, 5);

                const sRow = document.createElement('div'); sRow.className = 'item-container';
                const iRow = document.createElement('div'); iRow.className = 'item-container';

                // Ses Butonları
                [...set].sort(() => Math.random() - 0.5).forEach(item => {
                    const sBtn = document.createElement('div');
                    sBtn.className = 'sound-card'; sBtn.innerHTML = '🔊';
                    sBtn.onclick = () => {
                        if(sBtn.classList.contains('matched')) return;
                        speak(item.n);
                        document.querySelectorAll('.sound-card').forEach(b => b.classList.remove('selected'));
                        sBtn.classList.add('selected');
                        activeSoundObj = item;
                        activeSoundElement = sBtn;
                    };
                    sRow.appendChild(sBtn);
                });

                // Resim Butonları
                [...set].sort(() => Math.random() - 0.5).forEach(item => {
                    const iBtn = document.createElement('div');
                    iBtn.className = 'image-card';
                    if(item.v.startsWith('#')) iBtn.style.background = item.v; else iBtn.innerText = item.v;
                    iBtn.onclick = () => {
                        if(iBtn.classList.contains('matched') || !activeSoundObj) return;
                        if(activeSoundObj.n === item.n) {
                            iBtn.classList.add('matched');
                            activeSoundElement.classList.add('matched');
                            activeSoundElement.innerHTML = '✅';
                            speak("Correct!");
                            matchWinCount++;
                            activeSoundObj = null; activeSoundElement = null;
                            if(matchWinCount === 5) { speak("Great Job Nehir!"); title.innerText = "🌟 AMAZING! 🌟"; setTimeout(nextTurn, 2500); }
                        } else { speak("Try again!"); }
                    };
                    iRow.appendChild(iBtn);
                });

                gameContainer.appendChild(sRow);
                gameContainer.appendChild(document.createElement('hr'));
                gameContainer.appendChild(iRow);
            }
        }

        function createCard(item) {
            const div = document.createElement('div'); div.className = 'card';
            if(item.v.startsWith('#')) div.style.backgroundColor = item.v; else div.innerText = item.v;
            return div;
        }
    </script>
</body>
</html>
